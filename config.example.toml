# ===========================================================================
# Polymarket copy-trading bot configuration
# Copy to `config.toml` and edit. Secrets (incl. the WSS RPC URL) live in `.env`.
# ===========================================================================

# "dry_run" = monitor + log copy decisions, place NO real orders (default, safe).
# "live"    = sign and submit real orders via the CLOB. Requires .env credentials.
mode = "dry_run"

# ---------------------------------------------------------------------------
# Position sizing — proportional to the target's trade size.
#   our_shares = target_shares * copy_factor * target.weight
# Then capped/floored by the USDC limits below.
# ---------------------------------------------------------------------------
# 按比例跟单：our_shares = 目标份数 × copy_factor × weight。
# 例：copy_factor=0.25，目标买 20 份 → 你买 5 份。订单按【按份额的市价单】下：
# BUY/SELL 都提交目标份额，价格上限/下限由 max_slippage 控制。
copy_factor = 0.25
min_order_usdc = 1.0      # skip copies smaller than this (dust)
max_order_usdc = 50.0     # never spend more than this on a single copy
only_buys = true          # true = only mirror entries (BUY), ignore the target's exits

# 把目标在同一结果上、极短时间内的多笔成交合并成「一笔」再下单。
# 默认 0 = 不合并、逐笔即时跟（延迟最低）。仅当目标会把一次意图拆成多笔
# 几乎同时的订单、且小切片被 min_order_usdc 卡掉时，才调大（如 100~150ms）。
aggregate_window_ms = 0

# 单个结果 token（盘口的某一边）累计下单 USDC 上限：达到后该 token 不再跟。
# 给「只买入、持有到结算」这类只加仓、不减仓的目标加一道总量闸。
# token id 每个 5 分钟窗口都会变，所以这个上限天然按窗口重置。0 = 不封顶。
max_market_usdc = 0.0

# Market-order price cap/floor, in absolute price units.
# BUY cap = target + this; SELL floor = target - this.
# e.g. 0.02 means target fill 0.50 -> BUY cap 0.52 (or SELL floor 0.48).
# Maker mode uses the same value as a passive offset:
# BUY limit = target - this; SELL limit = target + this.
max_slippage = 0.02

# "market" = share-sized market order (taker-style, FAK/FOK).
# "maker"  = share-sized post-only limit order (GTC, may not fill).
order_style = "market"

# Order time-in-force:
#   "FAK" = fill whatever crosses immediately, cancel the rest (recommended for
#           fast 5-minute markets — never leaves a resting order behind).
#   "FOK" = all-or-nothing, immediate.
# Used only when order_style = "market"; maker orders are always GTC post-only.
order_type = "FAK"

# 窗口对齐：true = 若在 5 分钟窗口中途启动，先等到下个整点边界再下单（跳过进行中的窗口）。
# 默认 false = 立即开始跟单、重启即时生效，不浪费当前窗口（延迟更友好，推荐保持 false）。
align_to_window = false

# 市场过滤：只复制「市场 slug 含此关键词」的成交（不区分大小写）。
# 留空 "" = 不过滤，跟目标在所有市场的交易（默认）。
# 想只跟 BTC 5 分钟就填 "btc-updown-5m"。
market_filter = ""

# ---------------------------------------------------------------------------
# Targets to follow. `address` is the trader's Polymarket wallet (the order
# maker / proxy address that appears in on-chain OrderFilled events).
# `weight` is an optional per-target multiplier on top of copy_factor.
# ---------------------------------------------------------------------------
[[targets]]
address = "0x0000000000000000000000000000000000000000"
weight = 1.0
label = "example-trader"

# [[targets]]
# address = "0x..."
# weight = 0.5
# label = "second-trader"

# ---------------------------------------------------------------------------
# Endpoints / contracts (override only if Polymarket changes them).
# The WebSocket RPC URL itself is set via PM_WSS_RPC in .env.
# ---------------------------------------------------------------------------
[endpoints]
clob = "https://clob.polymarket.com"
chain_id = 137
# EIP-712 verifying contract for signing live orders (CTF Exchange).
exchange = "0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E"
# Contracts whose fill events we subscribe to. Has a sensible default (the live
# Polymarket exchange verified on-chain); uncomment to override.
# log_sources = [
#   "0xe111180000d2663c0091e4f400237545b87b996b",
#   "0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E",
#   "0xC5d563A36AE78145C45a50134d48A1215220f80a",
# ]

[state]
state_file = "data/state.json"
ledger_file = "data/copies.jsonl"
